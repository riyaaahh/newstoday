name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Type-check, lint & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: malayalam_news
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/malayalam_news
      PAYLOAD_SECRET: ci-placeholder-secret-not-used-in-prod
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (avoids a version clash).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Payload types
        run: pnpm generate:types

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Push database schema
        run: pnpm exec tsx scripts/db-push.ts

      - name: Build
        run: pnpm build
